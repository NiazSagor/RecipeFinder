name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      version:
        description: "App version name (BuildConfig.APP_VERSION)"
        required: false
        default: "1.0"
      server_address:
        description: "Server network prefix (e.g. 192.168.10)"
        required: true
        default: "192.168.10"
      port:
        description: "Server port (e.g. 8614)"
        required: true
        default: "8614"
      build_type:
        description: "Build type"
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Generate local.properties
        id: envsetup
        shell: bash
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
          SERVER_ADDRESS: ${{ github.event.inputs.server_address }}
          PORT: ${{ github.event.inputs.port }}
          DEV_ENV_ID: ${{ secrets.DEV_ENV_ID }}
          PROD_ENV_ID: ${{ secrets.PROD_ENV_ID }}
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          if [ "$ENVIRONMENT" = "dev" ]; then
            ENV_ID="$DEV_ENV_ID"
          else
            ENV_ID="$PROD_ENV_ID"
          fi

          if [ -z "$ENV_ID" ]; then
            echo "::error::ENV_ID secret is empty — check DEV_ENV_ID / PROD_ENV_ID repository secrets"
            exit 1
          fi

          API_URL="http://${SERVER_ADDRESS}.${ENV_ID}:${PORT}/api/"

          {
            echo "BANK_MODULE_URL=${API_URL}"
            echo "TEST_URL=${API_URL}"
            echo "SPEECH_TO_TEXT_URL=${API_URL}"
            echo "AUTH_MODULE_URL=${API_URL}"
            echo "USER_MODULE_URL=${API_URL}"
            echo "CHAT_BOT_BASE_URL=${API_URL}"
            echo "VERSION=${VERSION_INPUT}"
          } >> local.properties

          echo "env_id=$ENV_ID" >> "$GITHUB_OUTPUT"

      - name: Debug env_id output
        run: echo "env_id output = '${{ steps.envsetup.outputs.env_id }}'"

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Get build date
        id: date
        run: echo "date=$(TZ='Asia/Dhaka' date +'%Y-%m-%d_%I-%M%p')" >> "$GITHUB_OUTPUT"

      - name: Get Access Token
        id: gauth
        run: |
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -d client_secret="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -d refresh_token="${{ secrets.GOOGLE_REFRESH_TOKEN }}" \
            -d grant_type=refresh_token | jq -r .access_token)

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "::error::Failed to obtain Google access token"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload APK to Google Drive
        run: |
          APK_PATH=$(find app/build/outputs/apk/${{ github.event.inputs.build_type }} -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK found to upload"
            exit 1
          fi

          FILE_NAME="app-${{ steps.envsetup.outputs.env_id }}-${{ github.event.inputs.build_type }}-${{ steps.date.outputs.date }}.apk"

          METADATA=$(cat <<EOF
          {
            "name": "${FILE_NAME}",
            "parents": ["${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}"]
          }
          EOF
          )

          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ steps.gauth.outputs.access_token }}" \
            -F "metadata=${METADATA};type=application/json;charset=UTF-8" \
            -F "file=@${APK_PATH};type=application/vnd.android.package-archive" \
            "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart")

          cat response.json

          if [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Drive upload failed with HTTP $HTTP_CODE"
            exit 1
          fi